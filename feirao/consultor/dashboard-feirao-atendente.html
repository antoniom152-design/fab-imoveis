<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAL · Feirão Online — Atendimento</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#08192E;--navy2:#0F2545;--navy3:#16335E;
  --gold:#C9A84C;--gold2:#E8C96A;--gold-dim:rgba(201,168,76,.10);--gold-b:rgba(201,168,76,.22);
  --teal:#0E7490;--teal2:#22D3EE;--teal-dim:rgba(14,116,144,.15);
  --green:#059669;--green2:#34D399;--green-dim:rgba(5,150,105,.10);
  --red:#DC2626;--red2:#F87171;--red-dim:rgba(220,38,38,.10);
  --amber:#D97706;--amber2:#FBBF24;--amber-dim:rgba(217,119,6,.10);
  --purple:#7C3AED;--purple2:#A78BFA;--purple-dim:rgba(124,58,237,.10);
  --surf:#0D1B2E;--surf2:#111F35;--surf3:#152844;
  --card:#152540;--card2:#1A2E50;
  --bdr:rgba(255,255,255,.07);--bdr2:rgba(255,255,255,.13);
  --txt:#E8EDF5;--muted:#7A90A8;--light:#4A6280;
  --r:10px;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--surf);color:var(--txt);font-size:13px;line-height:1.5;min-height:100vh}
button,input,select,textarea{font-family:'Inter',sans-serif}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:4px}
.hidden{display:none !important}

/* ══════ AUTH ══════ */
#authScreen{position:fixed;inset:0;z-index:9999;background:radial-gradient(circle at 30% 20%,#0d2544 0%,var(--navy) 60%);display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.auth-wrap{width:100%;max-width:460px}
.auth-logo{text-align:center;margin-bottom:26px}
.auth-brand{font-family:'Playfair Display',serif;font-size:27px;font-weight:700;color:var(--gold)}
.auth-tag{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-top:5px}
.fair-badge{display:inline-flex;align-items:center;gap:6px;margin-top:14px;background:var(--teal-dim);border:1px solid rgba(34,211,238,.3);color:var(--teal2);padding:6px 14px;border-radius:20px;font-size:10.5px;font-weight:600;letter-spacing:.5px}
.fair-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--teal2);box-shadow:0 0 8px var(--teal2);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.auth-card{background:var(--card);border:1px solid var(--bdr2);border-radius:14px;padding:28px;margin-top:20px}
.role-pick{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:6px}
.role-btn{background:var(--surf2);border:1.5px solid var(--bdr2);border-radius:var(--r);padding:20px 14px;text-align:center;cursor:pointer;transition:.15s}
.role-btn:hover{border-color:var(--gold-b);background:var(--gold-dim)}
.role-btn.active{border-color:var(--gold);background:var(--gold-dim)}
.role-btn .ic{font-size:26px;margin-bottom:8px}
.role-btn .ttl{font-weight:700;font-size:13px}
.role-btn .sub{font-size:10.5px;color:var(--muted);margin-top:3px}

.field{margin-top:14px}
.field label{display:block;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600}
.field select,.field input{width:100%;background:var(--surf2);border:1.5px solid var(--bdr2);border-radius:8px;padding:11px 12px;color:var(--txt);font-size:13.5px}
.field select:focus,.field input:focus{outline:none;border-color:var(--gold)}
.field input[type=password]{letter-spacing:4px;font-family:var(--mono)}
.btn-primary{width:100%;margin-top:18px;background:linear-gradient(135deg,var(--gold),#B8923C);color:#1a1200;border:none;border-radius:9px;padding:13px;font-weight:700;font-size:13.5px;cursor:pointer;letter-spacing:.3px}
.btn-primary:hover{filter:brightness(1.08)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.auth-err{color:var(--red2);font-size:11.5px;margin-top:10px;text-align:center;min-height:14px}
.auth-demo{text-align:center;margin-top:14px;font-size:10.5px;color:var(--light)}

/* ══════ APP SHELL ══════ */
#app{display:flex;min-height:100vh}
.sidebar{width:230px;flex-shrink:0;background:var(--navy2);border-right:1px solid var(--bdr);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sb-top{padding:20px 18px 16px;border-bottom:1px solid var(--bdr)}
.sb-brand{font-family:'Playfair Display',serif;color:var(--gold);font-size:18px;font-weight:700}
.sb-brand small{display:block;font-family:'Inter',sans-serif;font-size:9.5px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-top:2px}
.sb-user{padding:14px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:var(--gold-dim);border:1.5px solid var(--gold-b);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--gold);font-size:13px;flex-shrink:0}
.sb-user .nm{font-size:12.5px;font-weight:600}
.sb-user .rl{font-size:10px;color:var(--muted)}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:12.5px;font-weight:500;margin-bottom:2px;transition:.12s}
.sb-item:hover{background:var(--surf3);color:var(--txt)}
.sb-item.active{background:var(--gold-dim);color:var(--gold2);font-weight:600}
.sb-item .ic{font-size:15px;width:18px;text-align:center}
.sb-item .badge-count{margin-left:auto;background:var(--red);color:#fff;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:10px}
.sb-bottom{padding:14px 18px;border-top:1px solid var(--bdr)}
.sb-fair-timer{background:var(--surf3);border:1px solid var(--bdr2);border-radius:8px;padding:10px;text-align:center;margin-bottom:10px}
.sb-fair-timer .lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.sb-fair-timer .val{font-family:var(--mono);font-size:14px;color:var(--gold2);font-weight:600;margin-top:2px}
.sb-logout{width:100%;background:transparent;border:1px solid var(--bdr2);color:var(--muted);border-radius:8px;padding:9px;font-size:11.5px;cursor:pointer}
.sb-logout:hover{border-color:var(--red);color:var(--red2)}

.main{flex:1;min-width:0;padding:24px 28px 60px;max-width:1400px}
.pg-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.pg-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}
.pg-sub{font-size:11.5px;color:var(--muted);margin-top:3px}
.panel{display:none}
.panel.active{display:block;animation:fadein .25s}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── generic components ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:16px}
.kpi .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.kpi .val{font-family:var(--mono);font-size:25px;font-weight:600;margin-top:6px}
.kpi .sub{font-size:10.5px;color:var(--muted);margin-top:4px}
.kpi.gold .val{color:var(--gold2)}
.kpi.green .val{color:var(--green2)}
.kpi.red .val{color:var(--red2)}
.kpi.teal .val{color:var(--teal2)}
.kpi.purple .val{color:var(--purple2)}

.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;margin-bottom:16px}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.card-h h3{font-size:14.5px;font-weight:700}
.card-h .hint{font-size:10.5px;color:var(--muted)}

.btn{background:var(--surf3);border:1px solid var(--bdr2);color:var(--txt);padding:8px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:.12s}
.btn:hover{border-color:var(--gold-b);background:var(--gold-dim)}
.btn.gold{background:linear-gradient(135deg,var(--gold),#B8923C);color:#1a1200;border:none}
.btn.gold:hover{filter:brightness(1.08)}
.btn.danger{border-color:rgba(220,38,38,.35);color:var(--red2)}
.btn.danger:hover{background:var(--red-dim)}
.btn.green{border-color:rgba(5,150,105,.4);color:var(--green2)}
.btn.green:hover{background:var(--green-dim)}
.btn.sm{padding:5px 10px;font-size:11px}
.btn:disabled{opacity:.35;cursor:not-allowed}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:700;letter-spacing:.2px;white-space:nowrap}
.badge.b-novo{background:var(--teal-dim);color:var(--teal2)}
.badge.b-contato{background:var(--amber-dim);color:var(--amber2)}
.badge.b-proposta{background:var(--purple-dim);color:var(--purple2)}
.badge.b-reserva{background:var(--gold-dim);color:var(--gold2)}
.badge.b-assinatura{background:var(--green-dim);color:var(--green2)}
.badge.b-fechado{background:var(--green-dim);color:var(--green2)}
.badge.b-perdido{background:var(--red-dim);color:var(--red2)}
.badge.b-interesse{background:var(--teal-dim);color:var(--teal2)}
.badge.b-ativo{background:var(--green-dim);color:var(--green2)}
.badge.b-inativo{background:var(--red-dim);color:var(--red2)}
.badge.pri-alta{background:var(--red-dim);color:var(--red2)}
.badge.pri-media{background:var(--amber-dim);color:var(--amber2)}
.badge.pri-baixa{background:rgba(255,255,255,.06);color:var(--muted)}

table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--bdr2);font-weight:600}
td{padding:10px;border-bottom:1px solid var(--bdr);font-size:12.5px;vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.015)}
.tbl-wrap{overflow-x:auto}
select.mini,input.mini{background:var(--surf2);border:1px solid var(--bdr2);color:var(--txt);border-radius:6px;padding:6px 8px;font-size:11.5px}

.empty{text-align:center;padding:36px 20px;color:var(--muted)}
.empty .ic{font-size:30px;margin-bottom:8px;opacity:.6}

.modal-bg{position:fixed;inset:0;background:rgba(4,10,20,.72);backdrop-filter:blur(2px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card2);border:1px solid var(--bdr2);border-radius:14px;max-width:640px;width:100%;max-height:88vh;overflow-y:auto;padding:24px}
.modal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-h h3{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1}
.modal-close:hover{color:var(--txt)}

/* ── fila / lead cards ── */
.lead-card{background:var(--surf2);border:1px solid var(--bdr2);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:.12s;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
.lead-card:hover{border-color:var(--gold-b);transform:translateX(2px)}
.lead-card.urgent{border-left:3px solid var(--red)}
.lead-card.warn{border-left:3px solid var(--amber)}
.lead-card.ok{border-left:3px solid var(--green)}
.lc-main{display:flex;align-items:center;gap:12px;min-width:0}
.lc-ava{width:38px;height:38px;border-radius:50%;background:var(--navy3);border:1.5px solid var(--bdr2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--gold2);flex-shrink:0}
.lc-name{font-weight:700;font-size:13px}
.lc-meta{font-size:11px;color:var(--muted);margin-top:2px}
.lc-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sla{font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px}
.sla.urgent{background:var(--red-dim);color:var(--red2)}
.sla.warn{background:var(--amber-dim);color:var(--amber2)}
.sla.ok{background:var(--green-dim);color:var(--green2)}

/* ── detail lead ── */
.dl-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px}
@media(max-width:1000px){.dl-grid{grid-template-columns:1fr}}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:12.5px}
.info-row .k{color:var(--muted)}
.info-row .v{font-weight:600;text-align:right}
.journey{display:flex;flex-direction:column;gap:0}
.j-step{display:flex;gap:12px;position:relative;padding-bottom:18px}
.j-step:last-child{padding-bottom:0}
.j-step::before{content:'';position:absolute;left:9px;top:20px;bottom:0;width:2px;background:var(--bdr2)}
.j-step:last-child::before{display:none}
.j-dot{width:20px;height:20px;border-radius:50%;background:var(--surf2);border:2px solid var(--bdr2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;z-index:1}
.j-step.done .j-dot{background:var(--green);border-color:var(--green);color:#fff}
.j-step.current .j-dot{background:var(--gold);border-color:var(--gold);color:#1a1200;box-shadow:0 0 0 4px var(--gold-dim)}
.j-txt .ttl{font-size:12px;font-weight:600}
.j-txt .ttl.dim{color:var(--muted);font-weight:500}
.j-txt .sub{font-size:10.5px;color:var(--muted)}

.timeline{display:flex;flex-direction:column;gap:10px;max-height:340px;overflow-y:auto;padding-right:4px}
.tl-item{display:flex;gap:10px;font-size:12px}
.tl-dot{width:7px;height:7px;border-radius:50%;background:var(--teal2);margin-top:5px;flex-shrink:0}
.tl-item.mgr .tl-dot{background:var(--gold2)}
.tl-txt b{font-weight:600}
.tl-time{font-size:10px;color:var(--light);font-family:var(--mono)}
.tl-item.mgr .tl-body{background:var(--gold-dim);border:1px solid var(--gold-b);border-radius:8px;padding:8px 10px}

.quick-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.quick-actions a,.quick-actions button{flex:1;min-width:120px;text-align:center}

.tabs{display:flex;gap:4px;border-bottom:1px solid var(--bdr2);margin-bottom:16px;flex-wrap:wrap}
.tab{padding:9px 16px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--gold2);border-bottom-color:var(--gold)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:700px){.grid2,.grid3{grid-template-columns:1fr}}

.import-drop{border:2px dashed var(--bdr2);border-radius:var(--r);padding:26px;text-align:center;cursor:pointer;transition:.12s}
.import-drop:hover{border-color:var(--gold-b);background:var(--gold-dim)}
.import-drop.drag{border-color:var(--gold);background:var(--gold-dim)}
.import-drop .ic{font-size:28px;margin-bottom:8px}

.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card2);border:1px solid var(--gold-b);border-left:3px solid var(--gold);padding:12px 16px;border-radius:8px;font-size:12.5px;box-shadow:0 8px 24px rgba(0,0,0,.4);min-width:240px;animation:slidein .25s}
@keyframes slidein{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

.toggle{position:relative;width:38px;height:21px;background:var(--surf2);border:1px solid var(--bdr2);border-radius:20px;cursor:pointer;flex-shrink:0}
.toggle::after{content:'';position:absolute;width:15px;height:15px;border-radius:50%;background:var(--muted);top:2px;left:2px;transition:.15s}
.toggle.on{background:var(--green-dim);border-color:var(--green)}
.toggle.on::after{background:var(--green2);left:19px}

.progress-bar{height:6px;background:var(--surf2);border-radius:4px;overflow:hidden;margin-top:6px}
.progress-bar span{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:4px}

.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.pill{background:var(--surf2);border:1px solid var(--bdr2);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--muted);cursor:pointer}
.pill.active{background:var(--gold-dim);border-color:var(--gold-b);color:var(--gold2);font-weight:600}

@media(max-width:860px){
  .sidebar{position:fixed;left:-230px;z-index:600;transition:.2s;box-shadow:8px 0 30px rgba(0,0,0,.4)}
  .sidebar.open{left:0}
  .main{padding:16px}
  #mobileToggle{display:flex !important}
}
#mobileToggle{display:none;position:fixed;top:14px;left:14px;z-index:590;width:38px;height:38px;background:var(--card2);border:1px solid var(--bdr2);border-radius:8px;align-items:center;justify-content:center;color:var(--gold);font-size:16px;cursor:pointer}
</style>
</head>
<body>

<!-- ══════════════════════ AUTH SCREEN ══════════════════════ -->
<div id="authScreen">
  <div class="auth-wrap">
    <div class="auth-logo">
      <div class="auth-brand">WAL Imóveis</div>
      <div class="auth-tag">Consultoria &amp; Negócios Imobiliários</div>
      <div class="fair-badge"><span class="dot"></span> Feirão Online 2026 · 29/jul – 01/ago</div>
    </div>
    <div class="auth-card">
      <div class="field"><label>Eu sou</label></div>
      <div class="role-pick">
        <div class="role-btn active" id="roleBtnGerente" onclick="pickRole('gerente')">
          <div class="ic">🧭</div><div class="ttl">Gerente</div><div class="sub">Waldyr Gomes</div>
        </div>
        <div class="role-btn" id="roleBtnAtendente" onclick="pickRole('atendente')">
          <div class="ic">🎧</div><div class="ttl">Atendente</div><div class="sub">Time de vendas</div>
        </div>
      </div>

      <div id="gerenteFields">
        <div class="field"><label>PIN do Gerente</label><input type="password" id="pinGerente" maxlength="6" placeholder="••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      </div>

      <div id="atendenteFields" class="hidden">
        <div class="field"><label>Selecione seu nome</label>
          <select id="selAtendente"></select>
        </div>
        <div class="field"><label>Seu PIN</label><input type="password" id="pinAtendente" maxlength="6" placeholder="••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      </div>

      <button class="btn-primary" onclick="doLogin()">Entrar no Painel</button>
      <div class="auth-err" id="authErr"></div>
      <div class="auth-demo">Demo — Gerente: PIN <b>9090</b> · Atendentes: PIN <b>1111 / 2222 / 3333 / 4444</b></div>
    </div>
  </div>
</div>

<!-- ══════════════════════ APP ══════════════════════ -->
<div id="mobileToggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</div>
<div id="app" class="hidden">

  <aside class="sidebar">
    <div class="sb-top">
      <div class="sb-brand">WAL · Feirão<small>Painel de Atendimento</small></div>
    </div>
    <div class="sb-user">
      <div class="sb-avatar" id="sbAvatar">W</div>
      <div><div class="nm" id="sbNome">—</div><div class="rl" id="sbPapel">—</div></div>
    </div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-bottom">
      <div class="sb-fair-timer">
        <div class="lbl">Feirão termina em</div>
        <div class="val" id="fairCountdown">--:--:--:--</div>
      </div>
      <button class="sb-logout" onclick="logout()">Sair</button>
    </div>
  </aside>

  <main class="main" id="mainArea"></main>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   ESTADO / PERSISTÊNCIA
   ═══════════════════════════════════════════════════════════ */

function loadState(){
  const raw = localStorage.getItem(STORE_KEY);
  if(raw){
    try{
      const parsed = JSON.parse(raw);
      if(!parsed.reservas) parsed.reservas = [];
      if(!parsed.solicitacoesViabilizador) parsed.solicitacoesViabilizador = [];
      parsed.empreendimentos.forEach(e=>{ if(!e.uf) e.uf='RJ'; if(!e.tipoImovel) e.tipoImovel='Lançamento'; });
      parsed.unidades.forEach(u=>{ if(!u.status || !['interesse','proposta','reserva','assinatura'].includes(u.status)) u.status='interesse'; });
      if(parsed.reservas) parsed.reservas.forEach(r=>{
        if(!r.documentosCliente) r.documentosCliente = {identidade:false, cpf:false, renda3m:false, residencia:false, declaracaoIR:false, reciboIR:false};
        if(!r.conjuge) r.conjuge = {tem:false, nome:'', cpf:'', email:'', telefone:'', renda:0, documentos:{identidade:false, cpf:false, renda3m:false, residencia:false, declaracaoIR:false, reciboIR:false}};
      });
      return parsed;
    }catch(e){}
  }
  const s = seedData();
  localStorage.setItem(STORE_KEY, JSON.stringify(s));
  return s;
}

function pickRole(role){

}
function fillAtendenteSelect(){
  const sel = document.getElementById('selAtendente');

  sel.innerHTML = ativos.length
    ? ativos.map(a=>`<option value="${a.id}">${a.nome}</option>`).join('')

}
function doLogin(){
  const isGerente = document.getElementById('roleBtnGerente').classList.contains('active');
  const errEl = document.getElementById('authErr');
  if(isGerente){
    const pin = document.getElementById('pinGerente').value.trim();
    if(pin !== GERENTE_PIN){ errEl.textContent='PIN incorreto.'; return; }
    SESSION = {tipo:'gerente', nome:GERENTE_NOME};
  } else {
    const selId = document.getElementById('selAtendente').value;
    const pin = document.getElementById('pinAtendente').value.trim();
    const at = STATE.atendentes.find(a=>a.id===selId);
    if(!at){ errEl.textContent='Selecione um atendente ativo.'; return; }
    if(!at.ativo){ errEl.textContent='Este atendente está desativado pelo gerente.'; return; }
    if(pin !== at.pin){ errEl.textContent='PIN incorreto.'; return; }
    SESSION = {tipo:'atendente', atendenteId:at.id, nome:at.nome};
  }
  errEl.textContent='';
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  initShell();
}

function tickCountdown(){
  const diff = FAIR_END.getTime()-Date.now();
  const el = document.getElementById('fairCountdown');
  if(diff<=0){ el.textContent='Encerrado'; return; }
  const d=Math.floor(diff/86400000), h=Math.floor(diff%86400000/3600000), m=Math.floor(diff%3600000/60000), s=Math.floor(diff%60000/1000);
  el.textContent = `${d}d ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function updateNavBadges(){
  if(SESSION.tipo==='gerente'){
    const semAtendente = STATE.leads.filter(l=>!l.atendenteId && l.status!=='fechado' && l.status!=='perdido').length;
    setBadge('leadsGerente', semAtendente);
  } else {
    const minhaUrgentes = STATE.leads.filter(l=>l.atendenteId===SESSION.atendenteId && ['novo','contato'].includes(l.status) && minutesSince(l.ultimaAtualizacao)>15).length;
    setBadge('minhaFila', minhaUrgentes);
  }
}

function getAtendente(id){ return STATE.atendentes.find(a=>a.id===id); }
function getEmpreendimento(id){ return STATE.empreendimentos.find(e=>e.id===id); }
function getConstrutora(id){ return STATE.construtoras.find(c=>c.id===id); }
function empNome(id){ const e=getEmpreendimento(id); if(!e) return '—'; const c=getConstrutora(e.construtoraId); return `${e.nome} <span style="color:var(--muted);font-weight:400">· ${c?c.nome:''}</span>`; }
function slaClass(lead){
  if(['fechado','perdido'].includes(lead.status)) return 'ok';
  const mins = minutesSince(lead.ultimaAtualizacao);
  if(mins>30) return 'urgent';
  if(mins>10) return 'warn';
  return 'ok';
}
function slaLabel(lead){
  if(['fechado','perdido'].includes(lead.status)) return '—';
  const mins = minutesSince(lead.ultimaAtualizacao);
  if(mins<1) return 'agora';
  if(mins<60) return mins+' min';
  return Math.floor(mins/60)+'h '+(mins%60)+'m';
}
function addHistorico(lead, tipo, texto, autor){
  lead.historico.push({tipo, texto, autor, data:nowISO()});
  lead.ultimaAtualizacao = nowISO();
}
function statsForAtendente(atId){
  const leads = STATE.leads.filter(l=>l.atendenteId===atId);
  const contatados = leads.filter(l=>l.historico.some(h=>h.tipo==='contato')).length;
  const propostas = leads.filter(l=>['proposta','reserva','assinatura','fechado'].includes(l.status)).length;
  const reservas = leads.filter(l=>['reserva','assinatura','fechado'].includes(l.status)).length;
  const fechados = leads.filter(l=>l.status==='fechado').length;
  const perdidos = leads.filter(l=>l.status==='perdido').length;
  const temposResp = leads.map(l=>{
    const rec = l.historico.find(h=>h.tipo==='encaminhamento');
    const cont = l.historico.find(h=>h.tipo==='contato');
    if(rec && cont) return (new Date(cont.data)-new Date(rec.data))/60000;
    return null;
  }).filter(v=>v!==null);
  const tempoMedio = temposResp.length? Math.round(temposResp.reduce((a,b)=>a+b,0)/temposResp.length) : null;
  const conversao = leads.length? Math.round(fechados/leads.length*100) : 0;
  return {total:leads.length, contatados, propostas, reservas, fechados, perdidos, tempoMedio, conversao};
}

/* ── Import parser (CSV/XLSX via SheetJS, PDF via pdf.js) ── */
function handleDrop(e){
  e.preventDefault(); e.currentTarget.classList.remove('drag');
  const f = e.dataTransfer.files[0]; if(f) processImportFile(f);
}
function handleFileSelect(e){
  const f = e.target.files[0]; if(f) processImportFile(f);
}
async function processImportFile(file){
  const name = file.name.toLowerCase();
  toast('Lendo arquivo: '+file.name+'…');
  try{
    let rows = [];
    if(name.endsWith('.pdf')){
      rows = await parsePdfUnidades(file);
    } else {
      rows = await parseSpreadsheetUnidades(file);
    }
    if(!rows.length){ toast('Não encontrei linhas reconhecíveis no arquivo.'); return; }
    renderImportPreview(rows);
  }catch(err){
    console.error(err);
    toast('Erro ao ler o arquivo. Verifique o formato.');
  }
}
function parseSpreadsheetUnidades(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      try{
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(ws, {defval:''});
        const rows = json.map(r=>normalizeRow(r)).filter(r=>r.bloco||r.unidade);
        resolve(rows);
      }catch(err){ reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}
function normalizeRow(r){
  const keys = Object.keys(r).reduce((acc,k)=>{ acc[k.trim().toLowerCase()] = r[k]; return acc; },{});
  const get = (...names)=>{ for(const n of names){ if(keys[n]!==undefined && keys[n]!=='') return keys[n]; } return ''; };
  let status = String(get('status')||'interesse').toLowerCase();
  const statusMap = {interesse:'interesse', proposta:'proposta', 'análise de crédito':'proposta', reserva:'reserva', sinal:'reserva', assinatura:'assinatura', contrato:'assinatura', 'contrato assinado':'assinatura'};
  status = statusMap[status] || 'interesse';
  let valor = get('valor','preço','preco','valor(r$)');
  valor = Number(String(valor).replace(/[^\d,.-]/g,'').replace(/\.(?=\d{3})/g,'').replace(',','.')) || 0;
  return {
    bloco: String(get('bloco','bl') || '').trim(),
    unidade: String(get('unidade','un','apto','apartamento') || '').trim(),
    tipologia: String(get('tipologia','tipo') || '').trim(),
    valor, status
  };
}
async function parsePdfUnidades(file){
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buf}).promise;
  let fullText = '';
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    fullText += content.items.map(it=>it.str).join(' ') + '\n';
  }
  // heurística: procura linhas com padrão bloco/unidade/tipologia/valor
  const lines = fullText.split(/\n|(?=Bloco\s*\d)/i).map(l=>l.trim()).filter(Boolean);
  const rows = [];
  const re = /bloco\s*[:\-]?\s*(\d+).{0,20}?(unidade|un|apto)\s*[:\-]?\s*(\d+).{0,40}?(\d+\s*quartos?[^R$]{0,20}|studio|cobertura)?.{0,10}?R?\$?\s*([\d.,]{4,})/i;
  lines.forEach(line=>{
    const m = line.match(re);
    if(m){
      rows.push({
        bloco:m[1], unidade:m[3], tipologia:(m[4]||'').trim()||'—',
        valor: Number(m[5].replace(/\./g,'').replace(',','.'))||0,
        status:'interesse'
      });
    }
  });
  return rows;
}
let pendingImportRows = [];
function renderImportPreview(rows){
  pendingImportRows = rows;
  const area = document.getElementById('importPreviewArea');
  area.innerHTML = `
  <div style="margin-top:14px">
    <div class="card-h"><h3>Prévia da importação (${rows.length} linha(s))</h3></div>
    <div class="tbl-wrap"><table>

/* ═══════════════ GERENTE · SIMULADOR FINANCEIRO ═══════════════ */
const MIP_TAXA = 0.051200/100; // taxa padrão (fallback) — sobre saldo devedor pós-amortização do mês anterior
const DFI_TAXA = 0.008036/100; // fixo sobre valor de avaliação
function calcIdade(dataNascStr){
  if(!dataNascStr) return null;
  const nasc = new Date(dataNascStr);
  const hoje = new Date();
  let idade = hoje.getFullYear()-nasc.getFullYear();
  const m = hoje.getMonth()-nasc.getMonth();
  if(m<0 || (m===0 && hoje.getDate()<nasc.getDate())) idade--;
  return idade;
}
function getMIPRatePorIdade(idade){
  // Tabela de referência por faixa etária (seguradora tipo ALLSEG) — taxa mensal sobre saldo devedor
  if(idade===null) return MIP_TAXA;
  if(idade<=25) return 0.010500/100;
  if(idade<=30) return 0.012500/100;
  if(idade<=35) return 0.015300/100;
  if(idade<=40) return 0.019200/100;
  if(idade<=45) return 0.026800/100;
  if(idade<=50) return 0.051200/100;
  if(idade<=55) return 0.072000/100;
  if(idade<=60) return 0.098000/100;
  if(idade<=65) return 0.130000/100;
  return 0.165000/100;
}
function calcSAC(pv, n, imMensal, mipTaxa, dfiTaxa, vAval){
  const amort = pv/n;
  let saldo = pv;
  const parcelas = [];
  for(let m=1;m<=n;m++){
    const juros = saldo*imMensal;
    const mip = saldo*mipTaxa;
    const dfi = vAval*dfiTaxa;
    const parcela = amort+juros+mip+dfi;
    saldo -= amort;
    parcelas.push({mes:m, parcela, amort, juros, mip, dfi, saldo:Math.max(saldo,0)});
  }
  return parcelas;
}
function calcPrice(pv, n, imMensal, mipTaxa, dfiTaxa, vAval){
  const pmt = imMensal>0 ? pv*(imMensal*Math.pow(1+imMensal,n))/(Math.pow(1+imMensal,n)-1) : pv/n;
  let saldo = pv;
  const parcelas = [];
  for(let m=1;m<=n;m++){
    const juros = saldo*imMensal;
    const amort = pmt-juros;
    const mip = saldo*mipTaxa;
    const dfi = vAval*dfiTaxa;
    saldo -= amort;
    parcelas.push({mes:m, parcela:pmt+mip+dfi, amort, juros, mip, dfi, saldo:Math.max(saldo,0)});
  }
  return parcelas;
}
function simularFinanciamento(){
  const valor = Number(document.getElementById('simValor').value)||500000;
  const entradaPct = Number(document.getElementById('simEntradaPct').value)||20;
  const prazo = Number(document.getElementById('simPrazo').value)||360;
  const taxaAnual = Number(document.getElementById('simTaxa').value)||8.5;
  const dataNasc = document.getElementById('simDataNasc').value;
  const rendaBruta = Number(document.getElementById('simRendaBruta').value)||0;
  const sistema = document.querySelector('input[name="simSistema"]:checked').value;

  const idade = calcIdade(dataNasc);
  const mipTaxa = getMIPRatePorIdade(idade);
  const entrada = valor*entradaPct/100;
  const pv = valor-entrada;
  const imMensal = Math.pow(1+taxaAnual/100,1/12)-1;
  const calcFn = sistema==='price' ? calcPrice : calcSAC;
  const parcelas = calcFn(pv, prazo, imMensal, mipTaxa, DFI_TAXA, valor);
  const totalPago = parcelas.reduce((s,p)=>s+p.parcela,0);
  const primeira = parcelas[0], ultima = parcelas[parcelas.length-1];
  const comprometimento = rendaBruta>0 ? (primeira.parcela/rendaBruta*100) : null;

  document.getElementById('simResultados').innerHTML = `
  <div class="kpi-row">
    <div class="kpi gold"><div class="lbl">1ª Parcela</div><div class="val" style="font-size:18px">${fmtMoney(primeira.parcela)}</div></div>
    <div class="kpi"><div class="lbl">Última Parcela</div><div class="val" style="font-size:18px">${fmtMoney(ultima.parcela)}</div></div>
    <div class="kpi teal"><div class="lbl">Total Financiado</div><div class="val" style="font-size:18px">${fmtMoney(pv)}</div></div>
    <div class="kpi green"><div class="lbl">Total Pago</div><div class="val" style="font-size:18px">${fmtMoney(totalPago)}</div></div>
    ${comprometimento!==null?`<div class="kpi ${comprometimento>30?'red':'green'}"><div class="lbl">Comprometimento de Renda</div><div class="val" style="font-size:18px">${comprometimento.toFixed(1)}%</div><div class="sub">${comprometimento>30?'Acima de 30% — atenção':'Dentro do limite de 30%'}</div></div>`:''}
  </div>
  <div class="card">
    <div class="card-h"><h3>Tabela de Amortização — ${sistema==='price'?'PRICE':'SAC'}</h3><span class="hint">Entrada de ${fmtMoney(entrada)} (${entradaPct}%) · Taxa ${taxaAnual}% a.a.${idade!==null?' · Idade '+idade+' anos (MIP '+(mipTaxa*100).toFixed(6)+'%)':''}</span></div>
    <div class="tbl-wrap" style="max-height:360px;overflow-y:auto"><table>
      <thead><tr><th>Mês</th><th>Parcela</th><th>Amortização</th><th>Juros</th><th>MIP</th><th>DFI</th><th>Saldo Devedor</th></tr></thead>
      <tbody>${parcelas.filter((p,i)=>i%1===0 && (i<12||i%12===0||i===parcelas.length-1)).map(p=>`<tr>
        <td>${p.mes}</td><td>${fmtMoney(p.parcela)}</td><td>${fmtMoney(p.amort)}</td><td>${fmtMoney(p.juros)}</td><td>${fmtMoney(p.mip)}</td><td>${fmtMoney(p.dfi)}</td><td>${fmtMoney(p.saldo)}</td>
      </tr>`).join('')}</tbody>
    </table></div>
    <div class="hint" style="margin-top:8px">Mostrando o 1º ano completo + marcos anuais e a última parcela, para leitura rápida durante o atendimento.</div>
  </div>`;
}
function renderSimulador(){
  return `
  <div class="pg-header"><div><div class="pg-title">Simulador Financeiro — Feirão</div><div class="pg-sub">Mesma lógica de cálculo do simulador.html (SAC / PRICE, MIP por idade e DFI)</div></div></div>
  <div class="card">

      <div class="field" style="margin-top:0"><label>Renda bruta familiar (R$)</label><input id="simRendaBruta" type="number" placeholder="Ex: 12000"></div>
    </div>
    <div class="field"><label>Sistema</label>
      <div class="pill-row">
        <label class="pill active" style="cursor:pointer"><input type="radio" name="simSistema" value="sac" checked style="margin-right:6px">SAC</label>
        <label class="pill" style="cursor:pointer"><input type="radio" name="simSistema" value="price" style="margin-right:6px">PRICE</label>

async function enviarIA(){
  const input = document.getElementById('iaInput');
  const txt = input.value.trim();
  if(!txt) return;
  const apiKey = document.getElementById('iaApiKey').value.trim();
  if(!apiKey){ toast('Informe sua chave da API Anthropic acima.'); return; }
  iaChatHistory.push({role:'user', content:txt});
  input.value='';
  renderPanel('consultorIA');
  const box = document.getElementById('iaChatBox');
  box.insertAdjacentHTML('beforeend', `<div style="align-self:flex-start;color:var(--muted);font-size:12px">Consultor IA está digitando…</div>`);
  try{
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true','x-api-key':apiKey,'anthropic-version':'2023-06-01'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:700,
        system:'Você é o Consultor IA do Feirão Online WAL Imóveis, especialista em fechamento de vendas para militares, servidores públicos e civis, com domínio de CFIAe, SAC, PRICE, FGTS, objeções comuns e condições especiais de feirão. Responda de forma direta, prática e orientada à ação, em português, para apoiar o Gerente dos Atendentes e o time durante o evento.',
        messages: iaChatHistory.map(m=>({role:m.role, content:m.content}))
      })
    });
    const data = await resp.json();
    const text = (data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('\n') || 'Não obtive resposta.';
    iaChatHistory.push({role:'assistant', content:text});
  }catch(err){
    iaChatHistory.push({role:'assistant', content:'Erro ao consultar a IA. Verifique a chave da API e a conexão.'});
  }
  renderPanel('consultorIA');

function registrarRetornoViabilizador(id){

const DOC_TIPOS = {
  identidade:'Identidade (RG/CNH)', cpf:'CPF', renda3m:'Comprovante de Renda (3 últimos)',
  residencia:'Comprovante de Residência', declaracaoIR:'Declaração de Imposto de Renda', reciboIR:'Recibo do Imposto de Renda'
};
function docsVazios(){ return {identidade:false, cpf:false, renda3m:false, residencia:false, declaracaoIR:false, reciboIR:false}; }
function ensureReserva(lead, unidade){
  let r = STATE.reservas.find(x=>x.leadId===lead.id && x.unidadeId===unidade.id);
  const emp = getEmpreendimento(unidade.empreendimentoId);
  if(!r){
    r = {
      id:uid('rv'), leadId:lead.id, unidadeId:unidade.id, atendenteId:lead.atendenteId,
      clienteNome:lead.nome, clienteCpf:lead.cpf, clienteTelefone:lead.telefone, clienteEmail:lead.email,
      orgao:lead.orgao, patente:lead.patente, rendaDeclarada:lead.rendaDeclarada, rendaConjuge:lead.rendaConjuge,
      empreendimentoNome: emp?emp.nome:'—', unidadeDesc:`Bloco ${unidade.bloco} · Un. ${unidade.unidade} · ${unidade.tipologia}`,
      valorUnidade:unidade.valor, valorSinal: Math.round(unidade.valor*0.05),
      status:'aguardando_analise', parecerViabilizador:'', parecerData:null, emailEnviado:false,
      documentosCliente: docsVazios(),
      conjuge: {tem: !!(lead.rendaConjuge>0), nome:'', cpf:'', email:'', telefone:'', renda: lead.rendaConjuge||0, documentos: docsVazios()},
      criadoEm:nowISO()
    };
    STATE.reservas.push(r);
  }
  saveState();
  return r;
}
function docChecklistHtml(reservaId, docsObj, target){
  return Object.entries(DOC_TIPOS).map(([k,label])=>`
    <label style="display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;cursor:pointer">
      <input type="checkbox" ${docsObj[k]?'checked':''} onchange="toggleDoc('${reservaId}','${target}','${k}',this.checked)">
      ${label} ${docsObj[k]?'<span class="badge b-fechado" style="margin-left:4px">Anexado</span>':'<span class="badge b-novo" style="margin-left:4px">Pendente</span>'}
    </label>`).join('');
}
function toggleDoc(reservaId, target, docKey, checked){
  const r = STATE.reservas.find(x=>x.id===reservaId);
  if(target==='cliente') r.documentosCliente[docKey] = checked;
  else r.conjuge.documentos[docKey] = checked;
  saveState(); renderPanel('reservaUnidade');
}
function toggleConjuge(reservaId, checked){
  const r = STATE.reservas.find(x=>x.id===reservaId);
  r.conjuge.tem = checked;
  saveState(); renderPanel('reservaUnidade');
}
function editConjugeField(reservaId, field, value){
  const r = STATE.reservas.find(x=>x.id===reservaId);
  r.conjuge[field] = field==='renda' ? Number(value) : value;
  saveState();

function criarReservaManual(){
  const leadId = document.getElementById('novaResLead').value;

  toast('Reserva registrada para '+lead.nome+'.');
  renderPanel('reservaUnidade');

function registrarParecerViabilizador(id){

function renderMinhaFila(){
  const meus = STATE.leads.filter(l=>l.atendenteId===SESSION.atendenteId);
  const ativos = meus.filter(l=>!['fechado','perdido'].includes(l.status))
    .sort((a,b)=>{
      const order = {alta:0, media:1, baixa:2};
      const oa = order[a.prioridade], ob = order[b.prioridade];
      if(oa!==ob) return oa-ob;
      return minutesSince(b.ultimaAtualizacao)-minutesSince(a.ultimaAtualizacao);
    });
  const encerrados = meus.filter(l=>['fechado','perdido'].includes(l.status));

  return `
  <div class="pg-header">
    <div><div class="pg-title">Minha Fila — Feirão Online</div><div class="pg-sub">Leads encaminhados por ${GERENTE_NOME} para você atender agora</div></div>
  </div>
  <div class="kpi-row">
    <div class="kpi"><div class="lbl">Na fila</div><div class="val">${ativos.length}</div></div>
    <div class="kpi red"><div class="lbl">SLA estourado</div><div class="val">${ativos.filter(l=>slaClass(l)==='urgent').length}</div></div>
    <div class="kpi green"><div class="lbl">Fechados no feirão</div><div class="val">${encerrados.filter(l=>l.status==='fechado').length}</div></div>
  </div>
  <div class="card">
    <div class="card-h"><h3>Atendimento ativo</h3><span class="hint">Ordenado por prioridade e tempo de espera</span></div>
    ${ativos.map(l=>`<div class="lead-card ${slaClass(l)==='urgent'?'urgent':slaClass(l)==='warn'?'warn':'ok'}" onclick="verLeadAtendente('${l.id}')">
      <div class="lc-main"><div class="lc-ava">${l.nome.split(' ').map(w=>w[0]).slice(0,2).join('')}</div>
        <div><div class="lc-name">${l.nome}</div><div class="lc-meta">${l.orgao} · ${l.patente} — ${empNome(l.empreendimentoInteresse)}</div></div></div>
      <div class="lc-right">
        <span class="badge pri-${l.prioridade}">${l.prioridade.toUpperCase()}</span>
        <span class="badge b-${l.status}">${STATUS_LABELS[l.status]}</span>
        <span class="sla ${slaClass(l)}">${slaLabel(l)}</span>
      </div>
    </div>`).join('') || '<div class="empty"><div class="ic">🎧</div>Nenhum lead na sua fila no momento.<br>Aguarde o encaminhamento do Gerente.</div>'}
  </div>
  ${encerrados.length?`<div class="card">
    <div class="card-h"><h3>Encerrados</h3></div>
    ${encerrados.map(l=>`<div class="lead-card" style="cursor:default;opacity:.7" onclick="verLeadAtendente('${l.id}')">
      <div class="lc-main"><div class="lc-ava">${l.nome.split(' ').map(w=>w[0]).slice(0,2).join('')}</div>
        <div><div class="lc-name">${l.nome}</div><div class="lc-meta">${empNome(l.empreendimentoInteresse)}</div></div></div>
      <span class="badge b-${l.status}">${STATUS_LABELS[l.status]}</span>
    </div>`).join('')}
  </div>`:''}
  `;
}

    <div class="kpi teal"><div class="lbl">Contatados</div><div class="val">${s.contatados}</div></div>
    <div class="kpi purple"><div class="lbl">Propostas</div><div class="val">${s.propostas}</div></div>
    <div class="kpi gold"><div class="lbl">Reservas</div><div class="val">${s.reservas}</div></div>
    <div class="kpi green"><div class="lbl">Fechados</div><div class="val">${s.fechados}</div></div>
  </div>
  <div class="card">
    <div class="card-h"><h3>Taxa de conversão</h3></div>
    <div class="progress-bar"><span style="width:${s.conversao}%"></span></div>
    <div class="hint" style="margin-top:6px">${s.conversao}% dos leads recebidos viraram venda fechada.</div>
    <div class="hint" style="margin-top:10px">Tempo médio até o primeiro contato: <b>${s.tempoMedio!==null?s.tempoMedio+' minutos':'sem dados suficientes'}</b></div>
  </div>`;
}

/* ═══════════════ LEAD DETAIL (compartilhado Gerente/Atendente) ═══════════════ */
function renderLeadDetail(){
  const lead = STATE.leads.find(l=>l.id===activeLeadId);
  if(!lead) return '<div class="empty">Lead não encontrado.</div>';
  const emp = getEmpreendimento(lead.empreendimentoInteresse);
  const construtora = emp ? getConstrutora(emp.construtoraId) : null;
  const unidadesEmp = emp ? STATE.unidades.filter(u=>u.empreendimentoId===emp.id) : [];
  const backFn = SESSION.tipo==='gerente' ? "goTo('leadsGerente')" : "goTo('minhaFila')";
  const canAct = SESSION.tipo==='atendente' && lead.atendenteId===SESSION.atendenteId;

  const stageIdx = JOURNEY_STAGES.indexOf(lead.status);
  const journeyHtml = JOURNEY_STAGES.map((st,i)=>{
    const cls = lead.status==='perdido' ? '' : (i<stageIdx?'done':(i===stageIdx?'current':''));
    const icon = i<stageIdx?'✓':(i+1);
    return `<div class="j-step ${cls}"><div class="j-dot">${icon}</div><div class="j-txt"><div class="ttl ${cls?'':'dim'}">${STATUS_LABELS[st]}</div></div></div>`;
  }).join('');

  return `
  <div class="pg-header">
    <div><button class="btn sm" onclick="${backFn}">← Voltar</button></div>
    <div style="display:flex;gap:8px;align-items:center">
      <span class="sla ${slaClass(lead)}">${slaLabel(lead)==='—'?'Encerrado':'Última atualização: '+slaLabel(lead)+' atrás'}</span>
      <span class="badge pri-${lead.prioridade}">Prioridade ${lead.prioridade.toUpperCase()}</span>
    </div>
  </div>

  <div class="dl-grid">
    <div>
      <div class="card">
        <div class="card-h"><h3>${lead.nome}</h3><span class="badge b-${lead.status}">${STATUS_LABELS[lead.status]}</span></div>
        <div class="info-row"><span class="k">Órgão / Força</span><span class="v">${lead.orgao}</span></div>
        <div class="info-row"><span class="k">Patente / Cargo</span><span class="v">${lead.patente}</span></div>
        <div class="info-row"><span class="k">Telefone</span><span class="v">${lead.telefone}</span></div>
        <div class="info-row"><span class="k">E-mail</span><span class="v">${lead.email}</span></div>
        <div class="info-row"><span class="k">CPF</span><span class="v">${lead.cpf}</span></div>
        <div class="info-row"><span class="k">Origem no feirão</span><span class="v">${lead.origem}</span></div>
        <div class="info-row"><span class="k">Cadastrado em</span><span class="v">${fmtDT(lead.criadoEm)}</span></div>

        <div class="quick-actions">
          <a class="btn green sm" target="_blank" href="https://wa.me/55${lead.telefone}?text=${encodeURIComponent('Olá '+lead.nome.split(' ')[0]+', aqui é o atendimento do Feirão Online WAL Imóveis!')}">💬 WhatsApp</a>
          <a class="btn sm" href="tel:${lead.telefone}">📞 Ligar</a>
          ${canAct?`<button class="btn gold sm" onclick="registrarContato('${lead.id}')">✓ Registrar contato</button>`:''}
        </div>
      </div>

      <div class="card">
        <div class="card-h"><h3>Interesse &amp; Financiamento</h3></div>
        <div class="info-row"><span class="k">Empreendimento</span><span class="v">${emp?emp.nome:'—'} ${construtora?'· '+construtora.nome:''}</span></div>
        <div class="info-row"><span class="k">Tipologia desejada</span><span class="v">${lead.tipologiaDesejada}</span></div>
        <div class="info-row"><span class="k">Faixa de valor</span><span class="v">${fmtMoney(lead.faixaValor)}</span></div>
        <div class="info-row"><span class="k">Renda declarada</span><span class="v">${fmtMoney(lead.rendaDeclarada)}${lead.rendaConjuge?' + '+fmtMoney(lead.rendaConjuge)+' (cônjuge)':''}</span></div>
        <div class="info-row"><span class="k">Modalidade sugerida</span><span class="v">${lead.modalidadeFinanciamento}</span></div>
        <div class="info-row"><span class="k">Parcela estimada</span><span class="v">${fmtMoney(lead.parcelaEstimada)}/mês</span></div>
        <div class="info-row"><span class="k">Unidade reservada</span><span class="v">${lead.unidadeReservada?lead.unidadeReservada:'—'}</span></div>

        <div class="info-row" style="border:none;padding-bottom:0"><span class="k">Documentos</span></div>
        <div class="pill-row">
          <span class="pill ${lead.documentos.identidade?'active':''}">Identidade ${lead.documentos.identidade?'✓':'pendente'}</span>
          <span class="pill ${lead.documentos.renda?'active':''}">Renda ${lead.documentos.renda?'✓':'pendente'}</span>
          <span class="pill ${lead.documentos.residencia?'active':''}">Residência ${lead.documentos.residencia?'✓':'pendente'}</span>
          <span class="pill ${lead.documentos.ir?'active':''}">IR ${lead.documentos.ir?'✓':'pendente'}</span>
        </div>
      </div>

      ${canAct?`<div class="card">
        <div class="card-h"><h3>Ações do atendimento</h3></div>
        <div class="grid2">
          <div class="field" style="margin-top:0"><label>Unidade a oferecer/reservar</label>
            <select class="mini" id="unidadeSelAcao" style="width:100%">
              ${unidadesEmp.map(u=>`<option value="${u.id}">Bloco ${u.bloco} · Un. ${u.unidade} · ${u.tipologia} · ${fmtMoney(u.valor)}</option>`).join('') || '<option value="">Nenhuma unidade cadastrada</option>'}
            </select>
          </div>
          <div style="display:flex;align-items:flex-end;gap:8px;flex-wrap:wrap">
            <button class="btn purple sm" style="border-color:rgba(124,58,237,.4);color:var(--purple2)" onclick="avancarStatus('${lead.id}','proposta')">Enviar Proposta</button>
            <button class="btn gold sm" onclick="avancarStatus('${lead.id}','reserva')">Confirmar Reserva</button>
            <button class="btn green sm" onclick="avancarStatus('${lead.id}','assinatura')">Registrar Assinatura</button>
          </div>
        </div>
        <div class="grid2" style="margin-top:12px">
          <button class="btn green sm" onclick="fecharVenda('${lead.id}')">🏆 Fechar Venda</button>
          <button class="btn danger sm" onclick="marcarPerdido('${lead.id}')">Marcar como Perdido</button>
        </div>
        <div class="field"><label>Adicionar nota ao histórico</label>
          <textarea id="notaTexto" rows="2" style="width:100%;background:var(--surf2);border:1px solid var(--bdr2);border-radius:8px;padding:9px;color:var(--txt)" placeholder="Ex: cliente pediu para retornar depois das 18h."></textarea>
          <button class="btn sm" style="margin-top:8px" onclick="adicionarNota('${lead.id}')">+ Adicionar nota</button>
        </div>
      </div>`:''}
    </div>

    <div>
      <div class="card">
        <div class="card-h"><h3>Jornada do Cliente</h3></div>
        <div class="journey">${journeyHtml}</div>
      </div>
      <div class="card">
        <div class="card-h"><h3>Histórico de Atendimento</h3></div>
        <div class="timeline">
          ${[...lead.historico].reverse().map(h=>`<div class="tl-item ${h.tipo==='gerente'?'mgr':''}">
            <div class="tl-dot"></div><div class="tl-body"><div class="tl-txt">${h.tipo==='gerente'?'📌 ':''}${h.texto}</div><div class="tl-time">${h.autor} · ${fmtDT(h.data)}</div></div>
          </div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

function requireOwnLead(leadId){
  const lead = STATE.leads.find(l=>l.id===leadId);
  if(SESSION.tipo==='atendente' && lead.atendenteId!==SESSION.atendenteId){ toast('Este lead não está atribuído a você.'); return null; }
  return lead;
}
function registrarContato(leadId){
  const lead = requireOwnLead(leadId); if(!lead) return;
  if(lead.status==='novo') lead.status='contato';
  addHistorico(lead, 'contato', 'Contato realizado pelo atendente.', SESSION.nome);
  saveState(); toast('Contato registrado.'); reopenLead(leadId);
}
function avancarStatus(leadId, novoStatus){
  const lead = requireOwnLead(leadId); if(!lead) return;
  const sel = document.getElementById('unidadeSelAcao');
  const unidade = sel && sel.value ? STATE.unidades.find(u=>u.id===sel.value) : null;
  lead.status = novoStatus;
  if(unidade){
    unidade.status = novoStatus==='proposta'?'proposta':(novoStatus==='reserva'?'reserva':'assinatura');
    lead.unidadeReservada = `Bloco ${unidade.bloco} · Un. ${unidade.unidade}`;
  }
  addHistorico(lead, 'status', `Status avançado para "${STATUS_LABELS[novoStatus]}"${unidade?' — unidade '+lead.unidadeReservada:''}.`, SESSION.nome);
  if(novoStatus==='reserva' && unidade){
    ensureReserva(lead, unidade);
    toast('Reserva registrada em "Reserva de Unidade" para envio ao Viabilizador.');
  }
  saveState(); toast('Status atualizado: '+STATUS_LABELS[novoStatus]); reopenLead(leadId);
}
function fecharVenda(leadId){
  const lead = requireOwnLead(leadId); if(!lead) return;
  lead.status='fechado';
  addHistorico(lead, 'fechamento', '🏆 Venda fechada no Feirão Online!', SESSION.nome);
  saveState(); toast('Parabéns! Venda fechada.'); reopenLead(leadId); updateNavBadges();
}
function marcarPerdido(leadId){
  const lead = requireOwnLead(leadId); if(!lead) return;
  if(!confirm('Marcar este lead como perdido?')) return;
  lead.status='perdido';
  addHistorico(lead, 'perdido', 'Lead marcado como perdido.', SESSION.nome);
  saveState(); toast('Lead marcado como perdido.'); reopenLead(leadId); updateNavBadges();
}
function adicionarNota(leadId){
  const lead = requireOwnLead(leadId); if(!lead) return;
  const txt = document.getElementById('notaTexto').value.trim();
  if(!txt) return;
  addHistorico(lead, 'nota', txt, SESSION.nome);
  saveState(); reopenLead(leadId);
}
function reopenLead(leadId){ activeLeadId=leadId; document.getElementById('mainArea').innerHTML = renderLeadDetail(); }

</script>
</body>
</html>
