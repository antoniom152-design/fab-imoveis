<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultor WAL — Assistente Imobiliário FAB</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:      #C9A84C;
  --gold-light:#E8C97A;
  --gold-dim:  #8A6E30;
  --navy:      #0A1628;
  --navy-mid:  #112240;
  --navy-light:#1C3461;
  --off-white: #F5F2EC;
  --cream:     #EDE8DF;
  --text-muted:#8A96A8;
  --border:    rgba(201,168,76,0.2);
  --bubble-user:   #1C3461;
  --bubble-bot:    #112240;
}

html, body {
  height: 100%;
  font-family: 'Barlow', sans-serif;
  background: var(--navy);
  color: var(--off-white);
  overflow: hidden;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0; opacity:0.5;
}

.app {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
  max-width: 820px;
  margin: 0 auto;
}

/* ─── HEADER ─── */
header {
  background: rgba(10,22,40,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  flex-shrink: 0;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--navy-light), var(--gold-dim));
  border: 1.5px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.avatar svg { width: 22px; height: 22px; }

.header-info {}
.header-name {
  font-family: 'Playfair Display', serif;
  font-size: 15px; font-weight: 700;
  color: var(--off-white);
  line-height: 1.2;
  display: flex; align-items: center; gap: 8px;
}
.mode-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 2px;
}
.mode-badge.lead {
  background: rgba(34,197,94,0.15);
  color: #22C55E;
  border: 1px solid rgba(34,197,94,0.3);
}
.mode-badge.consultor {
  background: rgba(201,168,76,0.15);
  color: var(--gold);
  border: 1px solid var(--border);
}
.header-status {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--text-muted);
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.08em;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #22C55E;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
}

.header-right {
  display: flex; align-items: center; gap: 12px;
}
.btn-nav {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--text-muted);
  text-decoration: none; transition: color .2s;
}
.btn-nav:hover { color: var(--gold); }
.btn-clear {
  background: none; border: 1px solid var(--border);
  color: var(--text-muted); cursor: pointer;
  padding: 5px 12px; font-size: 11px;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.1em; text-transform: uppercase;
  transition: border-color .2s, color .2s;
}
.btn-clear:hover { border-color: var(--gold); color: var(--gold); }

/* ─── MESSAGES ─── */
.messages {
  overflow-y: auto;
  padding: 28px 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.date-sep {
  text-align: center;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-family: 'Barlow Condensed', sans-serif;
  display: flex; align-items: center; gap: 12px;
}
.date-sep::before, .date-sep::after {
  content: ''; flex: 1; height: 1px;
  background: var(--border);
}

.msg-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  animation: fadeMsg .25s ease forwards;
  opacity: 0;
}
@keyframes fadeMsg {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.msg-row.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--navy-light);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 13px;
}
.msg-avatar.bot-av {
  background: linear-gradient(135deg, var(--navy-light), var(--gold-dim));
}

.bubble {
  max-width: 74%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 14.5px;
  line-height: 1.65;
  position: relative;
}
.msg-row.bot .bubble {
  background: var(--bubble-bot);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--off-white);
}
.msg-row.user .bubble {
  background: var(--bubble-user);
  border: 1px solid rgba(201,168,76,0.25);
  border-bottom-right-radius: 4px;
  color: var(--off-white);
}
.bubble-time {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 5px;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.05em;
  text-align: right;
}
.bubble strong { color: var(--gold-light); font-weight: 600; }
.bubble em { font-style: italic; color: var(--cream); }
.bubble ul { padding-left: 18px; margin: 6px 0; }
.bubble ul li { margin-bottom: 4px; }
.bubble p { margin-bottom: 8px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble .highlight-box {
  background: rgba(201,168,76,0.1);
  border-left: 3px solid var(--gold);
  padding: 10px 14px; margin: 10px 0;
  border-radius: 0 8px 8px 0;
  font-size: 13.5px;
}
.bubble .highlight-box strong { display: block; margin-bottom: 4px; font-size: 14px; }

/* consultor mode — destaque diferente */
.consultor-mode .bubble .highlight-box {
  border-color: var(--gold-light);
  background: rgba(201,168,76,0.15);
}

.action-chips {
  display: flex; flex-wrap: wrap; gap: 7px;
  margin-top: 10px;
}
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: none;
  border: 1px solid var(--border);
  color: var(--gold);
  padding: 5px 12px;
  font-size: 12px;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.08em;
  cursor: pointer; text-transform: uppercase;
  transition: background .2s, border-color .2s;
}
.chip:hover { background: rgba(201,168,76,0.1); border-color: var(--gold); }

.typing-row { display: flex; gap: 10px; align-items: flex-end; }
.typing-bubble {
  background: var(--bubble-bot);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  padding: 14px 18px;
  border-radius: 16px;
  display: flex; gap: 5px; align-items: center;
}
.typing-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--gold);
  animation: typingBounce 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30%           { transform: translateY(-6px); opacity: 1; }
}

/* ─── SUGGESTIONS ─── */
.suggestions-wrap { padding: 0 20px 8px; }
.suggestions-label {
  font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-muted); font-family: 'Barlow Condensed', sans-serif;
  margin-bottom: 8px;
}
.suggestions { display: flex; flex-wrap: wrap; gap: 7px; }
.suggestion-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 7px 14px;
  font-size: 12.5px;
  font-family: 'Barlow', sans-serif;
  cursor: pointer;
  border-radius: 20px;
  transition: all .2s;
  text-align: left;
}
.suggestion-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(201,168,76,0.07);
}

/* ─── INPUT AREA ─── */
.input-area {
  border-top: 1px solid var(--border);
  background: rgba(10,22,40,0.97);
  backdrop-filter: blur(12px);
  padding: 14px 20px 18px;
  flex-shrink: 0;
}
.input-row { display: flex; gap: 10px; align-items: flex-end; }

#userInput {
  flex: 1;
  background: var(--navy-mid);
  border: 1px solid var(--border);
  color: var(--off-white);
  padding: 12px 16px;
  font-size: 14px;
  font-family: 'Barlow', sans-serif;
  resize: none;
  outline: none;
  max-height: 120px;
  overflow-y: auto;
  line-height: 1.5;
  border-radius: 4px;
  transition: border-color .2s;
}
#userInput::placeholder { color: var(--text-muted); }
#userInput:focus { border-color: var(--gold); }

.btn-send {
  width: 46px; height: 46px;
  background: var(--gold);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; border-radius: 4px;
  transition: background .2s, transform .1s;
}
.btn-send:hover { background: var(--gold-light); transform: translateY(-1px); }
.btn-send:disabled { background: var(--gold-dim); cursor: not-allowed; transform: none; }
.btn-send svg { width: 18px; height: 18px; }

.input-footer {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 8px;
}
.input-hint {
  font-size: 10px; color: var(--text-muted);
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.06em;
}
.char-count {
  font-size: 10px; color: var(--text-muted);
  font-family: 'Barlow Condensed', sans-serif;
}

@media (max-width: 600px) {
  header { padding: 0 16px; }
  .messages { padding: 20px 12px 12px; }
  .bubble { max-width: 88%; font-size: 14px; }
  .input-area { padding: 12px 12px 16px; }
  .suggestions-wrap { padding: 0 12px 8px; }
  .btn-nav { display: none; }
}
</style>
</head>
<body>

<div class="app" id="app">

  <!-- ─── HEADER ─── -->
  <header>
    <div class="header-left">
      <div class="avatar">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2A1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1l3.5 1v-1.5L13 19v-5.5z" fill="#C9A84C"/>
        </svg>
      </div>
      <div class="header-info">
        <div class="header-name">
          Consultor WAL · IA
          <span class="mode-badge" id="modeBadge">Lead</span>
        </div>
        <div class="header-status">
          <span class="status-dot"></span>
          <span id="headerStatusText">Especialista em imóveis FAB</span>
        </div>
      </div>
    </div>
    <div class="header-right">
      <a href="index.html" class="btn-nav" id="navBack">← Início</a>
      <a href="imoveis.html" class="btn-nav" id="navImoveis">Imóveis</a>
      <button class="btn-clear" onclick="clearChat()">Limpar</button>
    </div>
  </header>

  <!-- ─── MESSAGES ─── -->
  <div class="messages" id="messages">
    <div class="date-sep">Hoje</div>
    <div class="msg-row bot" id="welcomeMsg">
      <div class="msg-avatar bot-av">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none">
          <path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2A1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1l3.5 1v-1.5L13 19v-5.5z" fill="#C9A84C"/>
        </svg>
      </div>
      <div>
        <div class="bubble" id="welcomeBubble"><!-- preenchido pelo JS --></div>
        <div class="bubble-time">agora</div>
      </div>
    </div>
  </div>

  <!-- ─── SUGGESTIONS ─── -->
  <div class="suggestions-wrap" id="suggestionsWrap">
    <div class="suggestions-label">Sugestões rápidas</div>
    <div class="suggestions" id="suggestionsContainer"></div>
  </div>

  <!-- ─── INPUT AREA ─── -->
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="userInput"
        rows="1"
        placeholder="Digite sua pergunta..."
        onkeydown="handleKey(event)"
        oninput="autoResize(this); updateCharCount(this)"
      ></textarea>
      <button class="btn-send" id="sendBtn" onclick="sendMessage()" title="Enviar (Enter)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span class="input-hint">Enter para enviar · Shift+Enter para nova linha</span>
      <span class="char-count" id="charCount">0 / 800</span>
    </div>
  </div>

</div>

<script>
/* ════════════════════════════════════════════════════════════
   MODO: detectado pela URL  ?modo=consultor  →  consultor
                              sem parâmetro   →  lead
════════════════════════════════════════════════════════════ */
const MODO = (new URLSearchParams(location.search).get('modo') || 'lead').toLowerCase();
const IS_CONSULTOR = MODO === 'consultor';

/* ════════════════════════════════════════════════════════════
   SYSTEM PROMPTS
════════════════════════════════════════════════════════════ */

const SYSTEM_LEAD = `Você é o Consultor WAL, assistente especializado em imóveis para militares e servidores da Força Aérea Brasileira (FAB).

IDENTIDADE E TOM:
- Profissional, cordial e direto — como um colega experiente que entende o mundo militar
- Usa linguagem acessível, sem jargão excessivo
- Trata o usuário com respeito, sabendo que pode ser de qualquer posto ou graduação
- Nunca inventa dados — se não souber algo específico, diz claramente e sugere buscar com o consultor humano

PAPEL DE ESPECIALISTA EM VENDAS:
Você não é apenas um tira-dúvidas — é um consultor de vendas consultivo. Sua missão é conduzir o lead ao fechamento de forma natural e respeitosa.

MÉTODO SPIN adaptado para imóveis FAB:
1. SITUAÇÃO: entenda o momento do lead (posto, tempo de serviço, família, moradia atual)
2. PROBLEMA: identifique a dor (aluguel caro, transferência, instabilidade de moradia)
3. IMPLICAÇÃO: faça o lead sentir o custo de não agir (anos pagando aluguel = capital perdido)
4. NECESSIDADE: apresente a solução ideal do portfólio WAL

SINAIS DE COMPRA — quando o lead demonstrar interesse concreto, avance para o fechamento:
- Perguntas sobre preço, prazo, documentação → ofereça agendar visita
- Comparações entre imóveis → ajude a decidir e sugira reserva
- "Vou pensar" → explore o que falta para a decisão; não deixe sem próximo passo

OBJEÇÕES COMUNS E COMO TRATAR:
- "Está caro": compare com custo do aluguel a longo prazo; mostre financiamento POUPEX/CFIAe
- "Preciso pensar": pergunte o que falta; ofereça enviar simulação detalhada pelo WhatsApp
- "Vou ver com minha esposa/marido": ofereça agendar visita para os dois juntos
- "Não sei se passa no crédito": explique que a WAL acompanha todo o processo
- "Ainda não é o momento": pergunte quando seria; mantenha o relacionamento

FECHAMENTO — sempre termine com um próximo passo claro:
- Agendar visita presencial
- Enviar simulação personalizada pelo WhatsApp
- Reservar unidade (link para reserva.html)
Botão de contato WAL WhatsApp: https://wa.me/5521XXXXXXXXX (substitua pelo número real)

CONHECIMENTO TÉCNICO:
- POUPEX: financiamento exclusivo para militares das FA, taxas abaixo do mercado. Oficiais e praças da ativa e reserva. Teto por posto/graduação.
- CFIAe: Carteira de Financiamento Imobiliário da Aeronáutica. Exclusivo FAB. Complementa POUPEX.
- FGTS: militares estatutários (ativos) NÃO têm FGTS. Apenas celetistas e civis. Deixar claro é fundamental.
- SFH: teto R$ 1,5 milhão. Taxas máx. 12% a.a.
- SAC vs Price: SAC tem parcelas decrescentes; Price parcelas fixas mas mais juros total. Para militares, SAC é geralmente melhor.
- Minha Casa Minha Vida: faixas 1 (até R$2.640/mês), 2 (até R$4.400), 3 (até R$8.000).
- ITBI: cobrado pelo município, geralmente 2–3% do valor do imóvel.
- CET: Custo Efetivo Total — sempre comparar CET, não só taxa nominal.

CLUSTERS FAB:
- RJ: Ilha do Governador (BAGL), Santa Cruz (BASC), Campo dos Afonsos (BAAF)
- SP: São José dos Campos (DCTA/ITA), Guarulhos (BAGL), Campinas

CARTEIRA DE IMÓVEIS:
Quando a conversa envolver imóveis, você receberá um bloco com dados reais da carteira WAL. Use esses dados; nunca invente imóveis.

SIMULAÇÃO:
Colete: renda bruta, posto/situação, tem FGTS?, valor desejado, cidade, prazo. Calcule: parcela máx = 30% renda; taxa ref. POUPEX ~8,16% a.a. Sempre diga "estimativa — confirme na instituição".

DOCUMENTAÇÃO típica: RG, CPF, certidão estado civil, comprovante residência (3 meses), holerite (3 meses), certidão de serviço.

FORMATO: use **negrito** para termos, listas para múltiplos itens, seja conciso e direto. Ao final de temas complexos, ofereça próximos passos.

LIMITES: não prometa aprovação de crédito; não cite taxas como definitivas. Para casos jurídicos, indique consultor Antonio Araujo — wal.imoveiseconsultoria@gmail.com`;

const SYSTEM_CONSULTOR = `Você é o Assistente de Vendas WAL, ferramenta interna para consultores da WAL Imóveis.

CONTEXTO:
Você está sendo usado por um consultor humano da WAL durante o atendimento ou preparação para atendimento. Seu papel é ser um copiloto de vendas — rápido, preciso e focado em fechar negócios.

CAPACIDADES PRINCIPAIS:

1. BUSCA NA CARTEIRA WAL
Quando receber dados da carteira, apresente imóveis de forma estruturada para o consultor:
- Filtro por cluster, UF, tipo, faixa de preço, quartos
- Comparativo entre empreendimentos
- Pontos fortes de cada imóvel para apresentar ao lead

2. TABELAS DE PREÇO (orientações)
Auxilie o consultor a interpretar tabelas de preço dos empreendimentos:
- Diferença entre valor de tabela e valor negociado
- Condições de pagamento (entrada + parcelas + chaves)
- Permuta, FGTS, financiamento bancário
- Quando acionar o gestor para desconto especial

3. SITES DOS EMPREENDIMENTOS PARCEIROS
Forneça os links diretos para que o consultor acesse as informações atualizadas:
- RIVA Incorporadora: https://www.rivainc.com.br
- CURY Construtora: https://www.cury.net
- EMCAMP Engenharia: consulte o gestor para link atualizado
Instrua o consultor a verificar plantas, memorial descritivo e estande de vendas nestes sites.

4. SCRIPTS DE VENDAS — use conforme a situação do lead:

SCRIPT ABORDAGEM INICIAL:
"[Nome], tudo bem? Sou [seu nome] da WAL Imóveis, especialista em imóveis para militares da FAB. Vi que você demonstrou interesse em [empreendimento/área]. Tenho algumas opções exclusivas que se encaixam muito bem no perfil de [posto/graduação]. Posso mostrar?"

SCRIPT SIMULAÇÃO POUPEX:
"Com sua renda de R$[X], pelo POUPEX você consegue financiar até R$[Y] em [Z] anos, com parcela inicial de aproximadamente R$[P]. Isso é menos do que a maioria paga de aluguel hoje. Quer ver o imóvel que mais se encaixa nesse perfil?"

SCRIPT OBJEÇÃO "ESTÁ CARO":
"Entendo sua preocupação. Mas vamos fazer uma conta rápida: você paga R$[aluguel] de aluguel hoje, certo? Em 10 anos, isso são R$[aluguel×120] que saem do seu bolso sem nada ficar pra você. Com o financiamento, esse dinheiro vira patrimônio. Faz sentido?"

SCRIPT OBJEÇÃO "PRECISO PENSAR":
"Claro, faz todo sentido refletir bem. Para te ajudar nessa decisão, o que você acha de eu te mandar uma simulação personalizada com os números exatos para o seu caso? Assim você tem tudo na mão para conversar com [cônjuge/família]. Qual o melhor número de WhatsApp?"

SCRIPT OBJEÇÃO "NÃO É O MOMENTO":
"Compreendo. Posso te perguntar: quando você imagina que seria o momento ideal? Pergunto porque as unidades disponíveis agora têm preço de lançamento — geralmente 15–20% abaixo do valor após a entrega. Não precisa decidir hoje, mas quero garantir que você tenha essa informação."

SCRIPT FECHAMENTO:

let imoveisCache = null;

function carregarImoveis() {
  return new Promise((resolve) => {
    if (imoveisCache) { resolve(imoveisCache); return; }
    const cb    = 'wal_cb_' + Date.now();
    const scr   = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); resolve([]); }, 8000);
    function cleanup() {
      clearTimeout(timer); delete window[cb];
      if (scr.parentNode) scr.parentNode.removeChild(scr);
    }
    window[cb] = (data) => {
      cleanup();
      try {
        const rows = data.table.rows || [];
        const g = (row, i) => { const c = row.c && row.c[i]; return c ? String(c.f || c.v || '').trim() : ''; };
        imoveisCache = rows
          .filter(row => row.c && row.c[1] && row.c[1].v === true)
          .map(row => ({
            nome:      g(row,5),  tipo:     g(row,2),
            cluster:   g(row,3),  cidade:   g(row,4),
            bairro:    g(row,16), uf:       g(row,15),
            descricao: g(row,6),  preco:    g(row,9) ? 'R$ '+parseFloat(g(row,9)).toLocaleString('pt-BR')+'.000' : g(row,8)||'',
            quartos:   g(row,12), area:     g(row,13),
            link:      g(row,11) || g(row,10) || ''
          }))
          .filter(i => i.nome);
        resolve(imoveisCache);
      } catch(e) { resolve([]); }
    };
    scr.src = 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json;responseHandler:'+cb+'&sheet='+encodeURIComponent(SHEET_ABA);
    scr.onerror = () => { cleanup(); resolve([]); };
    document.head.appendChild(scr);
  });
}

function imoveisParaTexto(lista) {
  if (!lista.length) return 'Nenhum imóvel ativo na carteira no momento.';
  return lista.map((im,i) => {
    const local = [im.bairro, im.cidade, im.uf].filter(Boolean).join(', ');
    return [
      (i+1)+'. **'+im.nome+'**',
      im.tipo      ? 'Tipo: '+im.tipo           : '',
      im.cluster   ? 'Cluster: '+im.cluster     : '',
      local        ? 'Local: '+local            : '',
      im.preco     ? 'Preço: '+im.preco         : '',
      im.quartos   ? 'Quartos: '+im.quartos     : '',
      im.area      ? 'Área: '+im.area+' m²'    : '',
      im.descricao ? 'Descrição: '+im.descricao : '',
      im.link      ? 'Link: '+im.link           : ''
    ].filter(Boolean).join(' | ');
  }).join('\n');
}

function perguntaSobreImoveis(texto) {

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  document.getElementById('suggestionsWrap').style.display = 'none';
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('charCount').textContent = '0 / 800';

  appendUserMessage(text);
  conversationHistory.push({ role: 'user', content: text });

  const typingEl = showTyping();
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  try {
    // Injeta carteira se pergunta for sobre imóveis
    let systemFinal = IS_CONSULTOR ? SYSTEM_CONSULTOR : SYSTEM_LEAD;
    if (perguntaSobreImoveis(text)) {
      const lista = await carregarImoveis();
      const uf_rj = lista.filter(i => i.uf.toUpperCase() === 'RJ');
      const uf_sp = lista.filter(i => i.uf.toUpperCase() === 'SP');
      const outros = lista.filter(i => i.uf.toUpperCase() !== 'RJ' && i.uf.toUpperCase() !== 'SP');

      let bloco = '\n\n════ CARTEIRA WAL IMÓVEIS — DADOS EM TEMPO REAL ════\n';
      bloco += `Total de imóveis ativos: ${lista.length}\n\n`;
      if (uf_rj.length) bloco += `RIO DE JANEIRO (${uf_rj.length}):\n${imoveisParaTexto(uf_rj)}\n\n`;
      if (uf_sp.length) bloco += `SÃO PAULO (${uf_sp.length}):\n${imoveisParaTexto(uf_sp)}\n\n`;
      if (outros.length) bloco += `OUTROS (${outros.length}):\n${imoveisParaTexto(outros)}\n\n`;
      bloco += 'Use esses dados para responder. Apresente de forma organizada. Se houver link, mencione-o.\n════════════════════════════════════════════';
      if (!lista.length) bloco += '\n\nATENÇÃO: carteira vazia ou falha ao carregar. Oriente o usuário a acessar imoveis.html ou contatar pelo WhatsApp.';
      systemFinal += bloco;
    }

    // Chama o backend (chave nunca exposta no front)
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model:      'claude-sonnet-4-5',
        max_tokens: 1024,
        system:     systemFinal,
        messages:   conversationHistory
      })
    });

    typingEl.remove();

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      appendBotMessage(`❌ Erro ${response.status}: ${err.error || 'Tente novamente.'}`);
      conversationHistory.pop();
      return;
    }

    const data = await response.json();
    const reply = data.content?.[0]?.text || 'Desculpe, não consegui processar sua pergunta.';
    conversationHistory.push({ role: 'assistant', content: reply });
    appendBotMessage(reply);

  } catch (err) {
    typingEl.remove();
    conversationHistory.pop();
    appendBotMessage('⚠️ Falha na conexão. Verifique se o servidor está rodando e tente novamente.');
    console.error(err);
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('userInput').focus();
  }
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatMarkdown(text) {
  let t = escapeHtml(text);
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  t = t.replace(/^[-•]\s+(.+)$/gm, '<li>$1</li>');
  t = t.replace(/(<li>.*<\/li>(\n|$))+/g, m => '<ul>' + m + '</ul>');
  t = t.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');
  const blocks = t.split(/\n{2,}/);
  t = blocks.map(b => {
    b = b.trim();
    if (!b) return '';
    if (b.startsWith('<ul>') || b.startsWith('<li>')) return b;
    return '<p>' + b.replace(/\n/g, '<br>') + '</p>';
  }).join('');
  return t;
}
